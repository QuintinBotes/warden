name: Bug report
description: Something in Warden isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please do not include secrets or API keys.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I run `warden analyze`, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Config: ...
        2. Command: ...
        3. See error: ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Warden version / commit
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - GitHub Action
        - Orchestrator / scope / gate
        - Agent / provider
        - Runner / browser engine
        - Test management / reporter
        - Dashboard / design system
        - Docs
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output. Redact secrets.
      render: shell
