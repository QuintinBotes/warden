# Warden V1 — Swarm dispatch manifest
# Machine-readable companion to 2026-07-07-warden-v1-design.md
# A swarm runner groups work-streams by `wave`, dispatches all streams in a wave in
# parallel (one agent each), runs the `barrier` check, then advances to the next wave.
#
# Contract: an agent implementing <id> may ONLY write files under `ownsPaths`, must satisfy
# every line in `acceptanceCriteria`, and is done when `testCmd` passes. TDD: write the
# acceptance tests first. Read the anchor in `contract` for the full interface.

version: 1
product: warden
spec: ./2026-07-07-warden-v1-design.md
conventions:
  language: typescript-esm-node20
  monorepo: pnpm-workspaces + turborepo
  unitTests: vitest
  isolation: worktree            # preferred; single-tree also safe (ownership is disjoint)
  ownershipRule: "write only under ownsPaths; @warden/core is read-only in waves 1-3"
  contractChangeRequests: docs/superpowers/specs/contract-change-requests.md

# Choose the model per work-stream by REASONING LOAD, not size.
# Opus for contract-defining and correctness-critical streams. Sonnet/Haiku ONLY when the
# stream is fully self-contained — the dispatch prompt must embed everything the agent needs
# so it never has to discover context across packages.
modelPolicy:
  effort: { opus: xhigh, sonnet: high, haiku: medium }
  selfContainedDispatch:
    - "Embed the work-stream's contract text (its spec.md#anchor) verbatim in the prompt."
    - "Embed acceptanceCriteria as the tests to write FIRST (TDD)."
    - "Attach the built @warden/core types (packages/core/dist/index.d.ts) so every signature is known."
    - "State ownsPaths and forbid edits outside them."
    - "Name the fixtures/fakes to use (from @warden/core/testing) so no sibling package is needed."
    - "A Sonnet/Haiku stream that cannot be made self-contained is escalated to Opus, not shipped under-specified."
  models:
    WS-00: { model: opus,   why: "Contract surface — everything depends on it; must be exactly right." }
    WS-10: { model: opus,   why: "Diff/risk/gate reasoning; correctness-critical pure logic." }
    WS-11: { model: opus,   why: "Provider tool-mapping + 3 agent strategies + prompt design — hardest stream." }
    WS-12: { model: opus,   why: "Two browser engines (incl. claude-chrome MCP) + CTRF + video/screenshot capture." }
    WS-13: { model: sonnet, why: "SQLite CRUD + YAML parse + coverage/flake math — well-specified, self-contained." }
    WS-14: { model: sonnet, why: "CTRF/Markdown/octokit payloads from exact templates — self-contained." }
    WS-20: { model: sonnet, why: "Wires frozen wave-1 APIs behind commander — integration, self-contained." }
    WS-21: { model: opus,   why: "CI orchestration + checks/annotations correctness across many edge cases." }
    WS-30: { model: sonnet, why: "Example apps + dogfood CI; pure example scaffolds may drop to haiku." }

barriers:
  afterWave: "pnpm -w build && pnpm -w test && pnpm -w typecheck"

waves:
  - wave: 0
    barrier: "pnpm --filter @warden/core build && pnpm --filter @warden/core test  # core exports frozen"
    workstreams:
      - id: WS-00
        package: "@warden/core"
        wave: 0
        dependsOn: []
        ownsPaths:
          - packages/core/**
          - package.json
          - pnpm-workspace.yaml
          - turbo.json
          - tsconfig.base.json
          - .eslintrc*
          - .prettierrc*
          - vitest.workspace.ts
        contract: "spec.md#part-d--the-contract-surface-wardencore-ws-00"
        acceptanceCriteria:
          - "Zod schemas parse every blueprint Part V example (Requirement/TestCase/TestPlan/TestExecution/TestResult)"
          - "CTRF schema + mergeCtrf type exported"
          - "ChangeSurface, TestTier, GateDecision types exported"
          - "LLMProvider, GenerateOptions, Tool, ToolCallResult, ProviderFactory exported"
          - "BrowserEngine + BrowserSession (goto/click/fill/act/extract/screenshot/readPage/setViewport/close) exported"
          - "Reporter + ReportContext exported"
          - "AgentStrategy/AgentInput/AgentOutput/ExploratoryFinding exported"
          - "QAPlatformPlugin hooks + defineConfig + loadConfig(c12) + WardenConfig schema exported with defaults"
          - "WardenError hierarchy + logger + deterministic id helpers (no Date.now/random)"
          - "testing/fakes.ts: fakeProvider/fakeBrowserSession/fakeReporter/fixtureChangeSurface/fixtureExecution"
          - "zero dependencies on any other @warden/* package"
        testCmd: "pnpm --filter @warden/core test"

  - wave: 1
    barrier: "pnpm -w build && pnpm -w test  # all wave-1 packages green against core"
    workstreams:
      - id: WS-10
        package: "@warden/orchestrator"
        wave: 1
        dependsOn: [WS-00]
        ownsPaths: [packages/orchestrator/**]
        contract: "spec.md#ws-10--wardenorchestrator--wave-1"
        acceptanceCriteria:
          - "analyzeChangeSurface: shared/infra paths escalate hasSharedChanges; module->tag derivation; API route extraction"
          - "scoreRisk matches blueprint RISK_RULES (auth 3, payment 5, db 4, security 4, config 2)"
          - "selectTiers maps risk 0-3 / 4-6 / 7-10 to tiers per blueprint Part VII"
          - "evaluateExitCriteria: CRITICAL->BLOCK, >2 HIGH->BLOCK, passRate<90%->BLOCK, HIGH->WARN, else PASS"
          - "pure functions; DiffFile[] injectable for tests (no live git required)"
        testCmd: "pnpm --filter @warden/orchestrator test"
      - id: WS-11
        package: "@warden/agent"
        wave: 1
        dependsOn: [WS-00]
        ownsPaths: [packages/agent/**]
        contract: "spec.md#ws-11--wardenagent--wave-1"
        acceptanceCriteria:
          - "createProvider returns AnthropicProvider for v1; throws ProviderError w/ helpful msg for openai/gemini/ollama"
          - "AnthropicProvider maps Tool[] to Anthropic tool format and parses tool calls (faked HTTP; no real API in unit tests)"
          - "exploratory strategy drives fakeBrowserSession -> ExploratoryFinding[] with CRITICAL/HIGH/MEDIUM/LOW"
          - "generative strategy emits valid TS spec files w/ role-based locators + @smoke/@regression tags"
          - "healer strategy classifies regression-vs-maintenance and returns HealerDiagnosis"
          - "every strategy returns a valid markdownReport"
        testCmd: "pnpm --filter @warden/agent test"
      - id: WS-12
        package: "@warden/runner"
        wave: 1
        dependsOn: [WS-00]
        ownsPaths: [packages/runner/**]
        contract: "spec.md#ws-12--wardenrunner--wave-1"
        acceptanceCriteria:
          - "createEngine returns playwright or claude-chrome per cfg.browser.engine"
          - "playwright engine: real role-based click/fill/goto/screenshot against a local fixture page"
          - "claude-chrome engine: implements every BrowserSession method via Claude-in-Chrome MCP tools (navigate/computer/read_page/find/form_input), tested against a FAKED mcp client"
          - "claude-chrome module header documents 'requires extension + site permission, local-first, not CI default'"
          - "runPlaywright converts Playwright JSON -> valid CTRF (core schema validates)"
          - "captures per-test artifacts: screenshot + video (+ trace) via Playwright config (video 'on'/'retain-on-failure'); writes them under artifactsDir and records screenshotPath/videoPath/tracePath on each TestResult for dashboard replay"
          - "no unit test requires a real Chrome extension"
        testCmd: "pnpm --filter @warden/runner test"
      - id: WS-13
        package: "@warden/test-management"
        wave: 1
        dependsOn: [WS-00]
        ownsPaths: [packages/test-management/**]
        contract: "spec.md#ws-13--wardentest-management--wave-1"
        acceptanceCriteria:
          - "SqliteStore (better-sqlite3) created via SQL migrations; round-trip saveExecution/getRecentExecutions"
          - "loadYamlCases parses tests/cases/*.yaml -> TestCase (core schema validates)"
          - "computeCoverage sets PASSED/FAILED/NOT_TESTED/PARTIAL per requirement"
          - "computeFlakeRate + shouldQuarantine match 0.2<rate<0.8 threshold"
          - "temp db per test; no shared global state"
        testCmd: "pnpm --filter @warden/test-management test"
      - id: WS-14
        package: "@warden/reporter"
        wave: 1
        dependsOn: [WS-00]
        ownsPaths: [packages/reporter/**]
        contract: "spec.md#ws-14--wardenreporter--wave-1"
        acceptanceCriteria:
          - "ctrf reporter writes schema-valid CTRF JSON"
          - "githubJobSummary reporter writes Markdown to injectable $GITHUB_STEP_SUMMARY path"
          - "prComment reporter renders the exact blueprint PR-report Markdown (snapshot test)"
          - "checkRunAnnotations builds octokit.checks.create payload w/ file/line annotations (octokit mocked)"
          - "aggregate merges multiple CTRF files correctly"
          - "no live GitHub calls in unit tests"
        testCmd: "pnpm --filter @warden/reporter test"

  - wave: 2
    barrier: "pnpm -w build && pnpm -w test  # CLI runs e2e on fixtures; Action composes locally"
    workstreams:
      - id: WS-20
        package: "@warden/cli"
        wave: 2
        dependsOn: [WS-10, WS-11, WS-12, WS-13, WS-14]
        ownsPaths: [packages/cli/**]
        contract: "spec.md#ws-20--wardencli-warden--wave-2"
        acceptanceCriteria:
          - "warden analyze --base --head --output writes test_tags/risk_score/run_full_suite in $GITHUB_OUTPUT format"
          - "warden run --grep runs runner, writes CTRF, invokes reporters"
          - "warden agent --strategy <s> --url --output produces report JSON (uses fakeProvider if no ANTHROPIC_API_KEY)"
          - "warden report aggregate --reports --pr aggregates + posts gate comment (octokit mocked in tests)"
          - "warden plan emits Test Plan Markdown; warden init scaffolds warden.config.ts + workflow"
        testCmd: "pnpm --filter @warden/cli test"
      - id: WS-21
        package: "warden-action"
        wave: 2
        dependsOn: [WS-20]
        ownsPaths:
          - packages/github-action/**
          - examples/.github/workflows/ai-qa.yml
        contract: "spec.md#ws-21--warden-action-github-action--wave-2"
        acceptanceCriteria:
          - "action.yml declares inputs (provider/model/strategy/risk-threshold/anthropic-api-key) + outputs (gate/risk-score/report-path)"
          - "main.ts orchestrates tiered jobs (smoke->analyze->selective/exploratory/api->generate->qa-gate) by shelling the CLI"
          - "four reporting surfaces produced on a dry-run PR-event fixture"
          - "Action loadable via 'uses: ./packages/github-action'"
          - "real Anthropic/GitHub exercised only in WS-30, not unit tests"
        testCmd: "pnpm --filter warden-action test"

  - wave: 3
    barrier: "dogfood PR on each example yields a real report; self-test workflow green"
    workstreams:
      - id: WS-30
        package: examples
        wave: 3
        dependsOn: [WS-20, WS-21]
        ownsPaths:
          - examples/**
          - .github/workflows/warden-selftest.yml
          - README.md
        contract: "spec.md#ws-30--examples--self-ci-dogfood--wave-3"
        acceptanceCriteria:
          - "next-app, express-api, monorepo examples run with @smoke/@regression Playwright tests + tests/cases/*.yaml"
          - "demo PR on each example yields PR comment + job summary + check run"
          - "warden-selftest.yml green (Warden reviews its own repo)"
          - "README '3 commands to first report' is accurate and <=10 min"
        testCmd: "pnpm --filter examples test"
